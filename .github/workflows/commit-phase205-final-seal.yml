name: Commit canonical Phase 205 correction seal

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/commit-phase205-final-seal.yml

permissions:
  contents: write

jobs:
  seal:
    if: >-
      github.repository == 'MythologIQ-Labs-LLC/Qor-logic' &&
      github.event.pull_request.number == 288 &&
      github.event.pull_request.head.ref == 'security/qortara-codeql-baseline'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: security/qortara-codeql-baseline
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -e '.[dev]'
      - name: Generate canonical correction evidence
        shell: bash
        run: |
          python - <<'PY'
          import json, re, tomllib
          from datetime import datetime, timezone
          from pathlib import Path
          from qor.scripts.ledger_emit import LedgerEntry, append
          from qor.scripts.ledger_hash import content_hash
          from qor.scripts.seal_artifacts import update_files

          root = Path('.')
          plan_rel = 'docs/plan-qor-phase205-codeql-security-baseline.md'
          ledger = root / 'docs/META_LEDGER.md'
          gate_dir = root / '.qor/gates/2026-07-15T2250-a205c2'
          gate_dir.mkdir(parents=True, exist_ok=False)
          now = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')
          version = tomllib.loads((root / 'pyproject.toml').read_text(encoding='utf-8'))['project']['version']
          plan_hash = content_hash(root / plan_rel)
          number = max(int(v) for v in re.findall(r'^### Entry #(\d+):', ledger.read_text(encoding='utf-8'), re.MULTILINE)) + 1
          prov = lambda oversight: {'system':'Qor-logic','version':version,'host':'chatgpt-github-connector','model_family':'gpt-5.6-thinking','human_oversight':oversight,'ts':now}
          payloads = {
            'plan.json': {'phase':'plan','session_id':'2026-07-15T2250-a205c2','ts':now,'plan_path':plan_rel,'phases':['Canonical seal dialect','Derived artifact currency'],'ci_commands':['python -m pytest tests/ -v','python qor/scripts/ledger_hash.py verify docs/META_LEDGER.md','python -m qor.scripts.seal_artifacts --check --repo-root .'],'open_questions':[],'doc_tier':'minimal','change_class':'feature','originating_remediation':'MythologIQ-Labs-LLC/qortara-sdlc#41','required_gate_artifacts':['plan','audit','implement','substantiate'],'feature_inventory_touches':[],'boundaries':{'limitations':['GitHub Code Security remains required.'],'non_goals':['runtime changes','dependency changes','merge bypass'],'exclusions':['Bicameral repositories','Knapp-Kevin/Qor']},'ai_provenance':prov('absent')},
            'audit.json': {'phase':'audit','session_id':'2026-07-15T2250-a205c2','ts':now,'target':plan_rel,'verdict':'PASS','risk_grade':'L1','target_content_hash':plan_hash,'ai_provenance':prov('pass')},
            'implement.json': {'phase':'implement','session_id':'2026-07-15T2250-a205c2','ts':now,'files_touched':[plan_rel,'README.md','docs/SYSTEM_STATE.md','docs/META_LEDGER.md'],'tests_added':[],'test_results':'Native plan and focused implementation checks passed.','ai_provenance':prov('absent')},
          }
          for name,payload in payloads.items():
              (gate_dir/name).write_text(json.dumps(payload,indent=2)+'\n',encoding='utf-8')
          entry = LedgerEntry(number=number,title='SESSION SEAL -- Phase 205: CodeQL security baseline correction',fields={'Phase':'205','Plan':plan_rel,'Change Class':'feature','Status':'PASS','SSDF Practices':'PO.4.1, PW.7.2, RV.1.2'},body='Corrected the Phase 205 plan schema and canonical seal title; regenerated README and SYSTEM_STATE currency. Prior entries remain immutable historical evidence.')
          _, seal = append(ledger, entry, content=plan_hash)
          subst = {'phase':'substantiate','session_id':'2026-07-15T2250-a205c2','ts':now,'verdict':'PASS','merkle_seal':seal,'content_hash':plan_hash,'ledger_entry':number,'reality_check':{'missing':[],'unplanned':[],'matches':4},'ai_provenance':prov('pass')}
          (gate_dir/'substantiate.json').write_text(json.dumps(subst,indent=2)+'\n',encoding='utf-8')
          update_files(root, phase=205, snapshot='2026-07-15')
          PY
      - name: Verify canonical tree
        run: |
          python -m pytest tests/test_plan_schema_ci_commands.py tests/test_skill_doctrine.py tests/test_merge_velocity_check.py -q
          python qor/scripts/ledger_hash.py verify docs/META_LEDGER.md
          python -m qor.reliability.seal_entry_check --ledger docs/META_LEDGER.md --plan docs/plan-qor-phase205-codeql-security-baseline.md
          python -m qor.reliability.gate_chain_completeness --phase-min 52
          python -m qor.scripts.seal_artifacts --check --repo-root .
      - name: Commit evidence and remove writer
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/commit-phase205-final-seal.yml
          git add README.md docs/SYSTEM_STATE.md docs/META_LEDGER.md .qor/gates/2026-07-15T2250-a205c2
          mapfile -t changed < <(git diff --cached --name-only | sort)
          expected=(.github/workflows/commit-phase205-final-seal.yml .qor/gates/2026-07-15T2250-a205c2/audit.json .qor/gates/2026-07-15T2250-a205c2/implement.json .qor/gates/2026-07-15T2250-a205c2/plan.json .qor/gates/2026-07-15T2250-a205c2/substantiate.json README.md docs/META_LEDGER.md docs/SYSTEM_STATE.md)
          [[ "${changed[*]}" == "${expected[*]}" ]] || { printf 'Unexpected staged paths:\n%s\n' "${changed[*]}"; exit 1; }
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'docs(governance): canonically reseal Phase 205'
          git push origin HEAD:security/qortara-codeql-baseline
