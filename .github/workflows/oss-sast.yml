name: OSS SAST

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: oss-sast-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: Semgrep Community Edition
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
          cache: pip
      - name: Install pinned open-source scanner
        run: python -m pip install semgrep==1.169.0
      - name: Scan Python and workflow sources
        id: scan
        continue-on-error: true
        env:
          SEMGREP_SEND_METRICS: 'off'
        run: semgrep scan --config p/default --config p/security-audit --error --metrics off --json --output semgrep.json .
      - name: Upload scan evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: semgrep-community-results
          path: semgrep.json
          if-no-files-found: error
          retention-days: 30
      - name: Enforce clean OSS SAST
        if: steps.scan.outcome != 'success'
        run: |
          echo '::error::Semgrep Community Edition found blocking findings or failed to scan. Review semgrep-community-results.'
          exit 1
