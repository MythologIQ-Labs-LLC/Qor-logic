name: OSS SAST

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: oss-sast-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: Semgrep Community Edition
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'
          cache: pip
      - name: Install pinned open-source scanner
        run: pip install semgrep==1.169.0
      - name: Scan production sources for blocking security findings
        id: scan
        continue-on-error: true
        env:
          SEMGREP_SEND_METRICS: 'off'
        run: >-
          semgrep scan
          --config p/security-audit
          --severity ERROR
          --error
          --metrics off
          --json
          --output semgrep.json
          --exclude docs
          --exclude tests
          --exclude fixtures
          --exclude vendor
          --exclude node_modules
          --exclude target
          --exclude dist
          --exclude build
          --exclude .next
          --exclude .github
          .
      - name: Upload scan evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: semgrep-community-results
          path: semgrep.json
          if-no-files-found: error
          retention-days: 30
      - name: Enforce clean OSS SAST
        if: steps.scan.outcome != 'success'
        run: |
          echo 'Semgrep found a blocking finding or failed to scan.'
          exit 1
