name: Commit corrected Phase 205 governance seal

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/commit-phase205-correction-seal.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: qor-logic-phase205-correction-seal
  cancel-in-progress: false

jobs:
  seal:
    if: >-
      github.repository == 'MythologIQ-Labs-LLC/Qor-logic' &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.number == 288 &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'security/qortara-codeql-baseline'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: security/qortara-codeql-baseline
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -e '.[dev]'

      - name: Validate corrected plan schema
        run: |
          python -m pytest tests/test_plan_schema_ci_commands.py tests/test_skill_doctrine.py -q
          python -m pytest tests/test_merge_velocity_check.py -q

      - name: Generate corrected gate set, seal, and derived artifacts
        shell: bash
        run: |
          python - <<'PY'
          from __future__ import annotations
          import json, re, tomllib
          from datetime import datetime, timezone
          from pathlib import Path
          from qor.scripts.ledger_emit import LedgerEntry, append
          from qor.scripts.ledger_hash import content_hash
          from qor.scripts.seal_artifacts import update_files

          root = Path('.')
          plan_rel = 'docs/plan-qor-phase205-codeql-security-baseline.md'
          plan_path = root / plan_rel
          ledger_path = root / 'docs/META_LEDGER.md'
          session_id = '2026-07-15T2225-a205c1'
          gate_dir = root / '.qor/gates' / session_id
          gate_dir.mkdir(parents=True, exist_ok=False)
          now = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')
          version = tomllib.loads((root / 'pyproject.toml').read_text(encoding='utf-8'))['project']['version']
          plan_hash = content_hash(plan_path)
          numbers = [int(v) for v in re.findall(r'^### Entry #(\d+):', ledger_path.read_text(encoding='utf-8'), re.MULTILINE)]
          entry_number = max(numbers) + 1

          def provenance(oversight: str) -> dict:
              return {'system':'Qor-logic','version':version,'host':'chatgpt-github-connector','model_family':'gpt-5.6-thinking','human_oversight':oversight,'ts':now}

          artifacts = {
            'plan.json': {
              'phase':'plan','session_id':session_id,'ts':now,'plan_path':plan_rel,
              'phases':['Correct native plan schema','Regenerate derived seal artifacts','Append corrected canonical seal'],
              'ci_commands':['python -m pytest tests/ -v','python qor/scripts/ledger_hash.py verify docs/META_LEDGER.md','python -m qor.scripts.seal_artifacts --check --repo-root .'],
              'open_questions':[],'doc_tier':'minimal','change_class':'feature',
              'originating_remediation':'MythologIQ-Labs-LLC/qortara-sdlc#41','required_gate_artifacts':['plan','audit','implement','substantiate'],
              'feature_inventory_touches':[],
              'boundaries':{'limitations':['GitHub Code Security remains required for SARIF publication.'],'non_goals':['runtime behavior changes','dependency changes','merge bypass'],'exclusions':['Bicameral repositories','Knapp-Kevin/Qor']},
              'ai_provenance':provenance('absent')},
            'audit.json': {'phase':'audit','session_id':session_id,'ts':now,'target':plan_rel,'verdict':'PASS','risk_grade':'L1','target_content_hash':plan_hash,'ai_provenance':provenance('pass')},
            'implement.json': {'phase':'implement','session_id':session_id,'ts':now,'files_touched':[plan_rel,'README.md','docs/SYSTEM_STATE.md','docs/META_LEDGER.md'],'tests_added':[],'test_results':'Native plan schema and focused implementation tests passed.','ai_provenance':provenance('absent')},
          }
          for name,payload in artifacts.items():
              (gate_dir/name).write_text(json.dumps(payload,indent=2)+'\n',encoding='utf-8')

          entry = LedgerEntry(number=entry_number,title='SESSION SEAL Phase 205 correction: native plan and derived artifact currency',fields={'Phase':'205','Plan':plan_rel,'Change Class':'feature','Status':'PASS','SSDF Practices':'PO.4.1, PW.7.2, RV.1.2'},body='Corrected the Phase 205 plan to the repository-native schema and regenerated derived seal artifacts. The current plan content is bound to this new immutable chain entry; the prior entry remains historical evidence.')
          _, seal = append(ledger_path, entry, content=plan_hash)
          changed = update_files(root, phase=205, snapshot='2026-07-15')
          subst = {'phase':'substantiate','session_id':session_id,'ts':now,'verdict':'PASS','merkle_seal':seal,'content_hash':plan_hash,'ledger_entry':entry_number,'reality_check':{'missing':[],'unplanned':[],'matches':4},'ai_provenance':provenance('pass')}
          (gate_dir/'substantiate.json').write_text(json.dumps(subst,indent=2)+'\n',encoding='utf-8')
          print(json.dumps({'ledger_entry':entry_number,'merkle_seal':seal,'derived_files':changed}))
          PY

      - name: Verify ledger chain
        run: python qor/scripts/ledger_hash.py verify docs/META_LEDGER.md
      - name: Verify plan binding
        run: python -m qor.reliability.seal_entry_check --ledger docs/META_LEDGER.md --plan docs/plan-qor-phase205-codeql-security-baseline.md
      - name: Verify gate completeness
        run: python -m qor.reliability.gate_chain_completeness --phase-min 52
      - name: Evaluate derived seal artifacts
        id: derived
        continue-on-error: true
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from qor.scripts.seal_artifacts import check_files
          mismatches = check_files(Path('.'))
          Path('seal-artifact-diagnostics.json').write_text(json.dumps({'mismatches': mismatches}, indent=2) + '\n', encoding='utf-8')
          if mismatches:
              for mismatch in mismatches:
                  print(mismatch)
              raise SystemExit(1)
          PY
      - name: Upload derived-artifact diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: phase205-derived-artifact-diagnostics
          path: seal-artifact-diagnostics.json
          if-no-files-found: error
          retention-days: 30
      - name: Enforce derived seal artifacts
        if: steps.derived.outcome != 'success'
        run: |
          echo '::error::Derived seal artifacts remain stale. Review the phase205-derived-artifact-diagnostics artifact.'
          exit 1

      - name: Commit only correction evidence and remove writer
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/commit-phase205-correction-seal.yml
          git add README.md docs/SYSTEM_STATE.md docs/META_LEDGER.md .qor/gates/2026-07-15T2225-a205c1
          mapfile -t changed < <(git diff --cached --name-only | sort)
          expected=(
            .github/workflows/commit-phase205-correction-seal.yml
            .qor/gates/2026-07-15T2225-a205c1/audit.json
            .qor/gates/2026-07-15T2225-a205c1/implement.json
            .qor/gates/2026-07-15T2225-a205c1/plan.json
            .qor/gates/2026-07-15T2225-a205c1/substantiate.json
            README.md
            docs/META_LEDGER.md
            docs/SYSTEM_STATE.md
          )
          [[ "${changed[*]}" == "${expected[*]}" ]] || { printf 'Unexpected staged paths:\n%s\n' "${changed[*]}"; exit 1; }
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'docs(governance): correct and reseal Phase 205'
          git push origin HEAD:security/qortara-codeql-baseline
