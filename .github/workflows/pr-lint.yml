name: PR Citation Lint

# Always runs on PR events. The doc-only detection step makes the citation
# lint step conditional, so doc-only PRs report success without the citation
# check (their content has no ledger entries to cite). This avoids the
# branch-protection deadlock where `paths-ignore` skipped the workflow but
# branch protection kept waiting for a `lint` status that would never arrive.

on:
  pull_request:
    types: [opened, reopened, synchronize, edited]
    paths-ignore:
      - "docs/archive/**"

concurrency:
  group: pr-lint-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Detect doc-only PR
        id: docs_only
        run: |
          BASE_BRANCH="${{ github.event.pull_request.base.ref }}"
          git fetch --no-tags --depth=50 origin "$BASE_BRANCH"
          CHANGED=$(git diff --name-only "origin/$BASE_BRANCH"...HEAD)
          printf "Changed files:\n%s\n\n" "$CHANGED"
          if [[ -z "$CHANGED" ]]; then
            echo "No changed files detected; treating as non-doc-only (lint will run)."
            echo "result=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if echo "$CHANGED" | grep -qvE '(^|.*/)(.*\.md|docs/.*|CHANGELOG\.md|\.github/.*\.md)$'; then
            echo "Non-doc files present; citation lint will run."
            echo "result=false" >> "$GITHUB_OUTPUT"
          else
            echo "Doc-only PR; citation lint will be skipped (workflow still reports success)."
            echo "result=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        if: steps.docs_only.outputs.result == 'false'
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -e .
        if: steps.docs_only.outputs.result == 'false'

      - name: Lint PR description per doctrine-governance-enforcement §6
        if: steps.docs_only.outputs.result == 'false'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_ACTOR: ${{ github.event.pull_request.user.login }}
        run: |
          printf '%s' "$PR_BODY" | python qor/scripts/pr_citation_lint.py --actor "$PR_ACTOR"

      - name: Doc-only PR — citation lint skipped
        if: steps.docs_only.outputs.result == 'true'
        run: |
          echo "Doc-only PR detected. Citation lint skipped per workflow paths policy."
          echo "Reporting success so branch protection can clear the required check."
