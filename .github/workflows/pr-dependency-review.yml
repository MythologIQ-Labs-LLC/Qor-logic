name: PR Dependency Review

# Phase 102 (GH #118 P1): catches vulnerable or banned-severity dependencies
# entering via PRs that touch dependency-bearing files. Fails on `high` severity.

on:
  pull_request:
    paths:
      - "pyproject.toml"
      - "requirements-release.txt"
      - ".github/workflows/**"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-dependency-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48  # v4.9.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e .
      - name: Dependency admission cooling-period check (Phase 105; WARN-only at V1)
        run: |
          python -m qor.scripts.dependency_admission_lint \
            --base "${{ github.event.pull_request.base.sha }}" \
            || true
