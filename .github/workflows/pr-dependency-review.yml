name: PR Dependency Review

# Phase 102 (GH #118 P1): catches vulnerable or banned-severity dependencies
# entering via PRs that touch dependency-bearing files. Fails on `high` severity.

on:
  pull_request:
    paths:
      - "pyproject.toml"
      - "requirements-release.txt"
      - ".github/workflows/**"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-dependency-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294  # v5.0.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e .
      - name: Dependency admission cooling-period check (Phase 107; hard-fail)
        run: |
          python -m qor.scripts.dependency_admission_lint \
            --base "${{ github.event.pull_request.base.sha }}"
