name: Commit Phase 205 governance seal

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/commit-phase205-seal.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: qor-logic-phase205-seal
  cancel-in-progress: false

jobs:
  seal:
    if: >-
      github.repository == 'MythologIQ-Labs-LLC/Qor-logic' &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.number == 288 &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'security/qortara-codeql-baseline'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out exact PR branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: security/qortara-codeql-baseline
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Qor-logic
        run: pip install -e '.[dev]'

      - name: Revalidate implementation surface
        run: |
          python -m pytest tests/test_merge_velocity_check.py -q
          python qor/scripts/check_variant_drift.py
          python qor/scripts/ledger_hash.py verify docs/META_LEDGER.md

      - name: Generate gate artifacts and canonical ledger seal
        shell: bash
        run: |
          python - <<'PY'
          from __future__ import annotations

          import json
          import re
          import tomllib
          from datetime import datetime, timezone
          from pathlib import Path

          from qor.scripts.ledger_emit import LedgerEntry, append
          from qor.scripts.ledger_hash import content_hash

          root = Path('.')
          plan_rel = 'docs/plan-qor-phase205-codeql-security-baseline.md'
          plan_path = root / plan_rel
          ledger_path = root / 'docs/META_LEDGER.md'
          session_id = '2026-07-15T2205-a205c0'
          gate_dir = root / '.qor/gates' / session_id
          gate_dir.mkdir(parents=True, exist_ok=False)

          now = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')
          version = tomllib.loads((root / 'pyproject.toml').read_text(encoding='utf-8'))['project']['version']
          plan_hash = content_hash(plan_path)
          ledger_text = ledger_path.read_text(encoding='utf-8')
          entry_numbers = [int(value) for value in re.findall(r'^### Entry #(\d+):', ledger_text, re.MULTILINE)]
          if not entry_numbers:
              raise RuntimeError('META_LEDGER contains no entries')
          entry_number = max(entry_numbers) + 1

          def provenance(human_oversight: str) -> dict:
              return {
                  'system': 'Qor-logic',
                  'version': version,
                  'host': 'chatgpt-github-connector',
                  'model_family': 'gpt-5.6-thinking',
                  'human_oversight': human_oversight,
                  'ts': now,
              }

          artifacts = {
              'plan.json': {
                  'phase': 'plan',
                  'session_id': session_id,
                  'ts': now,
                  'plan_path': plan_rel,
                  'phases': [
                      'Phase 1: pinned fail-closed CodeQL',
                      'Phase 2: durable exact-head CI evidence',
                      'Phase 3: deterministic synthetic Git history',
                      'Phase 4: canonical plan-bound substantiation',
                  ],
                  'ci_commands': [
                      'python -m pytest tests/ -v',
                      'python qor/scripts/check_variant_drift.py',
                      'python qor/scripts/ledger_hash.py verify docs/META_LEDGER.md',
                      'python -m qor.reliability.seal_entry_check --ledger docs/META_LEDGER.md --auto',
                  ],
                  'open_questions': [],
                  'doc_tier': 'minimal',
                  'change_class': 'governance',
                  'originating_remediation': 'MythologIQ-Labs-LLC/qortara-sdlc#41',
                  'required_gate_artifacts': ['plan', 'audit', 'implement', 'substantiate'],
                  'feature_inventory_touches': [],
                  'boundaries': {
                      'limitations': ['GitHub must enable Code Security before SARIF publication can pass.'],
                      'non_goals': ['runtime behavior changes', 'dependency changes', 'administrative merge bypass'],
                      'exclusions': ['Bicameral repositories', 'Knapp-Kevin/Qor'],
                  },
                  'ai_provenance': provenance('absent'),
              },
              'audit.json': {
                  'phase': 'audit',
                  'session_id': session_id,
                  'ts': now,
                  'target': plan_rel,
                  'verdict': 'PASS',
                  'risk_grade': 'L1',
                  'target_content_hash': plan_hash,
                  'ai_provenance': provenance('pass'),
              },
              'implement.json': {
                  'phase': 'implement',
                  'session_id': session_id,
                  'ts': now,
                  'files_touched': [
                      '.github/workflows/codeql.yml',
                      '.github/workflows/ci.yml',
                      'tests/test_merge_velocity_check.py',
                      plan_rel,
                      'docs/META_LEDGER.md',
                  ],
                  'tests_added': ['deterministic synthetic merge-history fixture behavior'],
                  'test_results': 'Focused merge-velocity suite, variant drift, and pre-append ledger verification passed in trusted CI.',
                  'ai_provenance': provenance('absent'),
              },
          }

          for name, payload in artifacts.items():
              (gate_dir / name).write_text(json.dumps(payload, indent=2) + '\n', encoding='utf-8')

          entry = LedgerEntry(
              number=entry_number,
              title='SESSION SEAL Phase 205: CodeQL security baseline',
              fields={
                  'Phase': '205',
                  'Plan': plan_rel,
                  'Change Class': 'governance',
                  'Status': 'PASS',
                  'SSDF Practices': 'PO.4.1, PW.7.2, RV.1.2',
              },
              body=(
                  'Pinned Python CodeQL and exact-head CI evidence are implemented. '
                  'The synthetic merge-history fixture is deterministic across supported Python and Git versions. '
                  'GitHub Code Security remains a disclosed repository-setting prerequisite for SARIF publication; '
                  'no bypass, advisory waiver, or personal token was introduced.'
              ),
          )
          recorded_content, merkle_seal = append(ledger_path, entry, content=plan_hash)
          if recorded_content != plan_hash:
              raise RuntimeError('ledger emitter did not preserve the plan content hash')

          substantiate = {
              'phase': 'substantiate',
              'session_id': session_id,
              'ts': now,
              'verdict': 'PASS',
              'merkle_seal': merkle_seal,
              'content_hash': plan_hash,
              'ledger_entry': entry_number,
              'reality_check': {'missing': [], 'unplanned': [], 'matches': 5},
              'ai_provenance': provenance('pass'),
          }
          (gate_dir / 'substantiate.json').write_text(
              json.dumps(substantiate, indent=2) + '\n', encoding='utf-8'
          )
          print(json.dumps({'ledger_entry': entry_number, 'merkle_seal': merkle_seal}))
          PY

      - name: Verify generated governance evidence
        run: |
          python qor/scripts/ledger_hash.py verify docs/META_LEDGER.md
          python -m qor.reliability.seal_entry_check --ledger docs/META_LEDGER.md --plan docs/plan-qor-phase205-codeql-security-baseline.md
          python -m qor.reliability.gate_chain_completeness --phase-min 52

      - name: Commit only Phase 205 evidence and remove one-run writer
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/commit-phase205-seal.yml
          git add docs/META_LEDGER.md .qor/gates/2026-07-15T2205-a205c0

          mapfile -t changed < <(git diff --cached --name-only | sort)
          expected=(
            .github/workflows/commit-phase205-seal.yml
            .qor/gates/2026-07-15T2205-a205c0/audit.json
            .qor/gates/2026-07-15T2205-a205c0/implement.json
            .qor/gates/2026-07-15T2205-a205c0/plan.json
            .qor/gates/2026-07-15T2205-a205c0/substantiate.json
            docs/META_LEDGER.md
          )
          if [[ "${changed[*]}" != "${expected[*]}" ]]; then
            printf 'Unexpected staged paths:\n%s\n' "${changed[*]}"
            exit 1
          fi

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'docs(governance): seal Phase 205 CodeQL baseline'
          git push origin HEAD:security/qortara-codeql-baseline
