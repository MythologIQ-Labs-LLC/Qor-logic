name: Release

on:
  push:
    tags: ['v*.*.*']
    paths-ignore:
      - "docs/archive/**"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Verify tag reachable from main (build-side early gate)
        run: |
          git fetch origin main --depth=100
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag ${GITHUB_REF_NAME} points at ${GITHUB_SHA} which is not reachable from origin/main. Build refused."
            exit 1
          fi
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install build (hash-pinned)
        run: pip install --require-hashes -r requirements-release.txt
      - run: python -m build
      - name: Install SBOM tool and generate SBOM
        run: |
          pip install cyclonedx-bom
          cyclonedx-py environment --of JSON --output-file dist/sbom.json
      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum *.whl *.tar.gz sbom.json > SHA256SUMS
          cat SHA256SUMS
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: release-dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Verify tag reachable from main (publish-side enforcement gate)
        run: |
          git fetch origin main --depth=100
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag ${GITHUB_REF_NAME} points at ${GITHUB_SHA} which is not reachable from origin/main. Publish refused."
            exit 1
          fi
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: release-dist
          path: dist/
      - name: Verify dist SHA256SUMS
        run: |
          cd dist
          sha256sum -c SHA256SUMS
      - name: Assemble evidence bundle
        run: |
          set -euo pipefail
          LOCKFILE_SHA=$(sha256sum requirements-release.txt | awk '{print $1}')
          ARTIFACT_SUMS=$(cat dist/SHA256SUMS)
          cat > dist/evidence.json <<EOF
          {
            "git_sha": "${GITHUB_SHA}",
            "tag": "${GITHUB_REF_NAME}",
            "workflow_run_id": "${GITHUB_RUN_ID}",
            "workflow_sha": "${GITHUB_SHA}",
            "lockfile_sha256": "${LOCKFILE_SHA}",
            "artifact_sha256sums": $(jq -Rs . < dist/SHA256SUMS),
            "action_pins": {
              "actions/checkout": "34e114876b0b11c390a56381ad16ebd13914f8d5",
              "actions/setup-python": "a26af69be951a213d495a4c3e4e4022e16d87065",
              "actions/upload-artifact": "ea165f8d65b6e75b540449e92b4886f43607fa02",
              "actions/download-artifact": "d3f86a106a0bac45b974a628896c90dbdf5c8093",
              "pypa/gh-action-pypi-publish": "cef221092ed1bacb1cc03d23a2d87d1d172e277b"
            }
          }
          EOF
          cat dist/evidence.json
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
      - name: Attach evidence bundle to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" \
            dist/*.whl dist/*.tar.gz \
            dist/sbom.json dist/evidence.json dist/SHA256SUMS \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
