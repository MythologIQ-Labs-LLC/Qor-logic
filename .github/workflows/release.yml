name: Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build + publish (e.g. v0.87.0)"
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ inputs.tag || github.ref_name }}
          fetch-depth: 0
          fetch-tags: true
      - name: Verify tag reachable from main (build-side early gate)
        env:
          REF: ${{ inputs.tag || github.ref_name }}
        run: |
          git fetch origin main --depth=100
          SHA=$(git rev-parse HEAD)
          if ! git merge-base --is-ancestor "$SHA" origin/main; then
            echo "::error::Tag ${REF} points at ${SHA} which is not reachable from origin/main. Build refused."
            exit 1
          fi
      # Phase 163 (GH release-gate): refuse to build/publish unless the CI
      # workflow concluded `success` for THIS exact tagged commit. The pure
      # decision is qor.scripts.release_ci_gate; the authenticated runs-list
      # call stays here. Fail-closed: no green CI run -> exit 1.
      - name: Verify CI succeeded for this SHA (build-side early gate)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA=$(git rev-parse HEAD)
          gh api "/repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs?head_sha=${SHA}&per_page=100" \
            | python -m qor.scripts.release_ci_gate --sha "$SHA"
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install build (hash-pinned)
        run: pip install --require-hashes -r requirements-release.txt
      - run: python -m build
      - name: Install SBOM tool (hash-pinned) and generate SBOM
        run: |
          pip install --require-hashes -r requirements-sbom.txt
          cyclonedx-py environment --of JSON --output-file dist/sbom.json
      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum *.whl *.tar.gz sbom.json > SHA256SUMS
          cat SHA256SUMS
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: release-dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ inputs.tag || github.ref_name }}
          fetch-depth: 0
          fetch-tags: true
      - name: Verify tag reachable from main (publish-side enforcement gate)
        env:
          REF: ${{ inputs.tag || github.ref_name }}
        run: |
          git fetch origin main --depth=100
          SHA=$(git rev-parse HEAD)
          if ! git merge-base --is-ancestor "$SHA" origin/main; then
            echo "::error::Tag ${REF} points at ${SHA} which is not reachable from origin/main. Publish refused."
            exit 1
          fi
      # Phase 163: enforcement gate -- mirror the build-side CI-success check at
      # the actual decision point (defense-in-depth, like the reachability gate).
      - name: Verify CI succeeded for this SHA (publish-side enforcement gate)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA=$(git rev-parse HEAD)
          gh api "/repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs?head_sha=${SHA}&per_page=100" \
            | python -m qor.scripts.release_ci_gate --sha "$SHA"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: release-dist
          path: dist/
      - name: Verify dist SHA256SUMS
        run: |
          cd dist
          sha256sum -c SHA256SUMS
      - name: Assemble evidence bundle
        env:
          REF: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          LOCKFILE_SHA=$(sha256sum requirements-release.txt | awk '{print $1}')
          ARTIFACT_SUMS=$(cat dist/SHA256SUMS)
          TAG_SHA=$(git rev-parse HEAD)
          cat > dist/evidence.json <<EOF
          {
            "git_sha": "${TAG_SHA}",
            "tag": "${REF}",
            "workflow_run_id": "${GITHUB_RUN_ID}",
            "workflow_sha": "${TAG_SHA}",
            "lockfile_sha256": "${LOCKFILE_SHA}",
            "artifact_sha256sums": $(jq -Rs . < dist/SHA256SUMS),
            "action_pins": {
              "actions/checkout": "9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0",
              "actions/setup-python": "ece7cb06caefa5fff74198d8649806c4678c61a1",
              "actions/upload-artifact": "043fb46d1a93c77aae656e7c1c64a875d1fc6a0a",
              "actions/download-artifact": "3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c",
              "pypa/gh-action-pypi-publish": "cef221092ed1bacb1cc03d23a2d87d1d172e277b"
            }
          }
          EOF
          cat dist/evidence.json
      - name: Prepare publish-only directory (Phase 104 fix)
        run: |
          set -euo pipefail
          mkdir -p dist-publish
          cp dist/*.whl dist/*.tar.gz dist-publish/
          ls -la dist-publish/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          packages-dir: dist-publish/
      - name: Verify published artifact via PyPI pull-back
        env:
          REF: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${REF#v}"
          echo "Verifying qor-logic==${VERSION} via PyPI pull-back"
          for i in 1 2 3 4 5 6; do
            rm -rf /tmp/pypi-verify
            mkdir -p /tmp/pypi-verify
            if pip download --no-deps --dest=/tmp/pypi-verify --no-cache-dir \
                --only-binary=:all: "qor-logic==${VERSION}" 2>&1 \
                && pip download --no-deps --dest=/tmp/pypi-verify --no-cache-dir \
                --no-binary=:all: "qor-logic==${VERSION}" 2>&1; then
              echo "PyPI pull-back succeeded on attempt ${i}"
              break
            fi
            if [ "$i" = "6" ]; then
              echo "::error::PyPI pull-back failed after 6 attempts (60s); aborting"
              exit 1
            fi
            sleep 10
          done
          cd /tmp/pypi-verify
          sha256sum *.whl *.tar.gz > /tmp/pypi-pullback-sums
          grep -E '\.whl$|\.tar\.gz$' "${GITHUB_WORKSPACE}/dist/SHA256SUMS" \
              > /tmp/expected-sums
          if ! diff -u <(sort /tmp/expected-sums) <(sort /tmp/pypi-pullback-sums); then
            echo "::error::PyPI pull-back SHA mismatch -- published artifact differs from locally-built artifact"
            exit 1
          fi
          echo "Pull-back verification PASS"
      - name: Attach evidence bundle to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          REF: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          gh release create "${REF}" \
            dist/*.whl dist/*.tar.gz \
            dist/sbom.json dist/evidence.json dist/SHA256SUMS \
            --title "${REF}" \
            --generate-notes
