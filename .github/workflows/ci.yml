name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/archive/**"
  pull_request:
    paths-ignore:
      - "docs/archive/**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      # matrix justification: Python library supporting 3.11-3.13; windows compat required because shadow_process.py uses os.replace (Windows-specific path handling)
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -e ".[dev]"
      - run: python -m pytest tests/ -v
      - run: python qor/scripts/check_variant_drift.py
      - run: python qor/scripts/ledger_hash.py verify docs/META_LEDGER.md
      # GAP-GOV-03: re-verify the COMMITTED seal's content_hash<->plan binding
      # (the local gates run only on the pre-commit working tree).
      - name: Re-verify committed seal binding
        run: python -m qor.reliability.seal_entry_check --ledger docs/META_LEDGER.md --auto
      # GH #231 (Phase 162): WARN-first base-currency gate -- surfaces a branch
      # that sealed against a stale origin/main tip (forked chain) before merge.
      # WARN-only in V1 (|| true); V2 flips to --enforce after false-positive data.
      - name: Ledger base-currency (WARN-only)
        run: python -m qor.reliability.ledger_base_currency --base-ref origin/main || true

  install-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: python -m pytest tests/test_packaging_install.py -v -m integration

  gate-chain-completeness:
    # Phase 52 wiring: refuses merge if any sealed phase >= 52 lacks
    # plan/audit/implement/substantiate.json gate artifacts. Closes the
    # skill-protocol bypass surface that allowed Phases 46/48/49/50 to
    # seal without writing gate artifacts (now-eighth instance of
    # SG-AdjacentState-A; structural countermeasure shipped Phase 52).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e .
      - name: Verify gate-chain completeness for sealed phases >= 52
        run: python -m qor.reliability.gate_chain_completeness --phase-min 52
      - name: seal-artifacts currency
        # Phase 164 (generate-not-assert): README badges + SYSTEM_STATE header
        # currency, enforced here on sealed state instead of the retired
        # per-test live-equality assertions that broke on every seal.
        # --skip-tests: this job installs -e . without dev extras, so pytest
        # is unavailable for the Tests-badge collect; that badge is verified
        # at seal time (substantiate Step 6.5) where the dev env exists.
        run: python -m qor.scripts.seal_artifacts --check --skip-tests --repo-root .

  provenance-attest:
    # Phase 158 wiring (GAP-GOV-05): non-forgeable gate-artifact provenance.
    # The keyless verify-committed step recomputes each committed artifact's
    # payload digest against its sidecar -- a forged committed artifact fails
    # the merge boundary. It needs no secret, so it runs on forks too. The
    # guarded ci-attest step then emits a CI-secret-keyed attestation only
    # trusted CI can produce (disclosed-skip when the secret is absent).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e .
      - name: Verify committed provenance sidecars for sealed phases >= 158
        run: python -m qor.scripts.gate_provenance verify-committed --phase-min 158
      - name: Emit CI attestation (skips when no secret configured)
        env:
          QOR_CI_ATTEST_SECRET: ${{ secrets.QOR_CI_ATTEST_SECRET }}
        run: python -m qor.scripts.gate_provenance attest-latest
