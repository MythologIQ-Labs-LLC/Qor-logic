## Purpose

The final phase of the S.H.I.E.L.D. lifecycle. Verify that implementation matches the encoded blueprint (Reality = Promise), then cryptographically seal the session.

## Critical Invariants

The binding contracts /qor-substantiate cannot violate. ABORT halts the seal; the session does not seal until every invariant clears.

1. Step 4.6 reliability gates -> non-zero exit aborts substantiate. The ladder runs: intent-lock (Phase 52), secret-scanner (Phase 53), procedural-fidelity (Phase 58), ci-coverage-lint (Step 4.6.5; Phase 89), dod-check (Step 4.6.7; Phase 92), merge-velocity-check (Step 4.6.8; Phase 93), skill-corpus-size-budget (Step 4.6.9; Phase 95). New gates extend the ladder forward; existing gates are not reordered.
